<div class="container mt-4">
	<h2>Reservas</h2>
	<div class="row mb-3">
		<div class="col-md-4">
			<label for="filtro-estado" class="form-label">Filtrar por estado</label>
			<select id="filtro-estado" class="form-select" (change)="onEstadoChange($event)" title="Filtrar por estado de la reserva" aria-label="Filtrar por estado de la reserva">
				<option value="">Todas</option>
				<option value="pendiente">Pendiente</option>
				<option value="confirmada">Confirmada</option>
				<option value="cancelada">Cancelada</option>
			</select>
		</div>
		<div class="col-md-8 text-end">
			<a class="btn btn-success" routerLink="/reservas/nueva">Nueva reserva</a>
		</div>
	</div>
	<div *ngIf="loading()" class="text-center my-4">
		<div class="spinner-border" role="status">
			<span class="visually-hidden">Cargando...</span>
		</div>
	</div>
	<div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>
	<table *ngIf="!loading() && reservas().length" class="table table-striped table-bordered">
		<thead>
			<tr>
				<th>Cliente</th>
				<th>Producto</th>
				<th>Fecha</th>
				<th>Cantidad</th>
				<th>Estado</th>
				<th>Acciones</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let r of reservas()">
				<td>{{ r.cliente }}</td>
				<td>{{ r.producto }}</td>
				<td>{{ r.fecha | date:'shortDate' }}</td>
				<td>{{ r.cantidad }}</td>
				<td>{{ r.estado }}</td>
				<td>
					  <a class="btn btn-sm btn-info me-1" [routerLink]="['/reservas', r._id || '']">Ver</a>
					  <a class="btn btn-sm btn-warning me-1" [routerLink]="['/reservas', r._id || '', 'editar']">Editar</a>
					  <button class="btn btn-sm btn-danger" (click)="deleteReserva(r._id || '')">Eliminar</button>
				</td>
			</tr>
		</tbody>
	</table>
	<nav *ngIf="total() > limit" class="d-flex justify-content-between align-items-center">
		<button class="btn btn-outline-primary" (click)="prevPage()" [disabled]="page() === 1">Anterior</button>
		<span>Página {{ page() }}</span>
		<button class="btn btn-outline-primary" (click)="nextPage()" [disabled]="page() * limit >= total()">Siguiente</button>
	</nav>
</div>
